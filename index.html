<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TezUstaTop — Ishonchli Ustalar Platformasi</title>
    <meta name="description" content="O'zbekistondagi eng yaxshi ustalarni toping. Santexnik, elektrik, konditsioner va boshqa xizmatlar bir joyda.">
    <meta name="keywords" content="usta, santexnik, elektrik, konditsioner, uy ta'miri, Toshkent, O'zbekiston">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>">
</head>

<body>
    <!-- Preloader -->
    <div id="preloader" class="preloader">
        <div class="preloader-content">
            <div class="preloader-logo">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                    <circle cx="32" cy="32" r="30" fill="url(#preloaderGrad)" />
                    <path d="M20 38l6-14h4l-3 8h6l-10 16h-2l3-10H20z" fill="white" />
                    <path d="M34 22l6-2 4 10-6 2-4-10z" fill="white" opacity="0.8" />
                    <path d="M38 32l8 4-4 10-8-4 4-10z" fill="white" opacity="0.6" />
                    <defs>
                        <linearGradient id="preloaderGrad" x1="0" y1="0" x2="64" y2="64">
                            <stop offset="0%" stop-color="#6366F1" />
                            <stop offset="100%" stop-color="#8B5CF6" />
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1 class="preloader-title">TezUstaTop</h1>
            <p class="preloader-subtitle">Ishonchli ustalar platformasi</p>
            <div class="preloader-bar">
                <div class="preloader-progress"></div>
            </div>
        </div>
    </div>

    <!-- App Root -->
    <div id="app">
        <!-- Top Navbar -->
        <nav id="top-navbar" class="top-navbar"></nav>

        <!-- Layout Container -->
        <div id="layout" class="layout">
            <!-- Sidebar -->
            <aside id="sidebar" class="sidebar hidden"></aside>

            <!-- Main Content -->
            <main id="main-content" class="main-content"></main>
        </div>

        <!-- Modal Overlay -->
        <div id="modal-overlay" class="modal-overlay hidden">
            <div id="modal-content" class="modal-content"></div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container" class="toast-container"></div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
